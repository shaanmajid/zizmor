on: [push]

name: use-trusted-publishing

jobs:
  bun-publish:
    name: bun-publish
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: vulnerable-1
        run: bun publish

      - name: vulnerable-2
        run: bun publish --access public

      # multiline bun commands are detected
      - name: vulnerable-3
        run: |
          bun \
            publish \
            --access \
            public

      # bunx npm publish workaround should still be flagged
      - name: vulnerable-4
        run: bunx npm publish

      # OK: --dry-run is not a real publish
      - name: not-vulnerable-1
        run: bun publish --dry-run

  true-negatives:
    name: true-negatives
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      # NOT OK: bun publish does not support trusted publishing yet
      - name: vulnerable-5
        run: bun publish

      # OK: bunx npm publish can still use npm's trusted publishing
      - name: safe-1
        run: bunx npm publish

  # Test cases: id-token: write + token env var (provenance + token auth)
  bun-provenance-with-token:
    name: bun-provenance-with-token
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      # NOT OK: bun publish does not support trusted publishing yet
      - name: vulnerable-6
        run: bun publish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: bunx npm publish with id-token AND NODE_AUTH_TOKEN
      - name: vulnerable-7
        run: bunx npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
