on: [push]

name: use-trusted-publishing

jobs:
  bun-publish:
    name: bun-publish
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: vulnerable-1
        run: bun publish

      - name: vulnerable-2
        run: bun publish --access public

      # multiline bun commands are detected
      - name: vulnerable-3
        run: |
          bun \
            publish \
            --access \
            public

      # bunx npm publish workaround should still be flagged
      - name: vulnerable-4
        run: bunx npm publish

      # OK: --dry-run is not a real publish
      - name: not-vulnerable-1
        run: bun publish --dry-run

  # Under id-token, `bun publish` is still flagged: Bun has no Trusted
  # Publishing support. `bunx npm publish` delegates to npm, so it's flagged
  # only when a manual token is present.
  id-token:
    name: id-token
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: vulnerable-5
        run: bun publish

      # OK: bunx npm publish can use Trusted Publishing (no manual token)
      - name: not-vulnerable-2
        run: bunx npm publish

      - name: vulnerable-6
        run: bunx npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
