on: [push]

name: npm-trusted-publishing-test

jobs:
  # Test cases that SHOULD be flagged (vulnerable)
  npm-manual-auth:
    name: npm-manual-auth
    runs-on: ubuntu-latest
    permissions: {} # No id-token permission
    environment: foobar
    steps:
      # NOT OK: actions/setup-node with registry-url and always-auth
      - name: vulnerable-1
        uses: actions/setup-node@v4 # zizmor: ignore[unpinned-uses]
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"
          always-auth: true
      - name: vulnerable-1-publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: actions/setup-node with registry-url (trailing slash) and always-auth
      - name: vulnerable-2
        uses: actions/setup-node@v4 # zizmor: ignore[unpinned-uses]
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org/"
          always-auth: true
      - name: vulnerable-2-publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-direct-commands:
    name: npm-direct-commands
    runs-on: ubuntu-latest
    permissions: {} # No id-token permission
    steps:
      # NOT OK: direct npm publish command
      - name: vulnerable-3
        run: npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: npm publish with arguments
      - name: vulnerable-4
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: multiline npm publish
      - name: vulnerable-5
        run: |
          npm config set registry https://registry.npmjs.org
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: yarn npm publish
      - name: vulnerable-6
        run: yarn npm publish
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: yarn npm publish with arguments
      - name: vulnerable-7
        run: yarn npm publish --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: pnpm publish
      - name: vulnerable-8
        run: pnpm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: pnpm publish with arguments
      - name: vulnerable-9
        run: pnpm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Test cases that should NOT be flagged (safe)
  npm-trusted-publishing:
    name: npm-trusted-publishing
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Has id-token permission
      contents: read
    steps:
      # OK: actions/setup-node with registry-url but no always-auth
      - name: safe-1
        uses: actions/setup-node@v4 # zizmor: ignore[unpinned-uses]
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"
      - name: safe-1-publish
        run: npm publish --provenance

      # OK: actions/setup-node without always-auth, even with trailing slash
      - name: safe-2
        uses: actions/setup-node@v4 # zizmor: ignore[unpinned-uses]
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org/"
      - name: safe-2-publish
        run: npm publish --provenance

      # OK: npm publish with id-token permission (trusted publishing)
      - name: safe-3
        run: npm publish

      # OK: GitHub Packages does not support npmjs Trusted Publishing
      - name: safe-4
        uses: actions/setup-node@v4 # zizmor: ignore[unpinned-uses]
        with:
          node-version: "18"
          registry-url: "https://npm.pkg.github.com"
          always-auth: true
      - name: safe-4-publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # OK: explicit custom publish registry is outside npmjs Trusted Publishing
      - name: safe-5
        run: npm publish --registry=https://npm.example.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CUSTOM_NPM_TOKEN }}

      # OK: same-run custom registry setup is outside npmjs Trusted Publishing
      - name: safe-6
        run: |
          npm config set registry http://localhost:4873
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CUSTOM_NPM_TOKEN }}

      # NOT OK: actions/setup-node with no registry-url means npmjs/default registry
      - name: vulnerable-10
        uses: actions/setup-node@v4 # zizmor: ignore[unpinned-uses]
        with:
          node-version: "18"
          always-auth: true
      - name: vulnerable-10-publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Test cases: id-token: write + token env var
  # These SHOULD be flagged: publish can see manual auth even though OIDC is available.
  npm-token-auth-with-id-token:
    name: npm-token-auth-with-id-token
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      # NOT OK: bare npm publish with NODE_AUTH_TOKEN
      - name: vulnerable-token-auth-1
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: yarn npm publish with YARN_NPM_AUTH_TOKEN
      - name: vulnerable-token-auth-2
        run: yarn npm publish
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: plain yarn publish with NODE_AUTH_TOKEN
      - name: vulnerable-token-auth-3
        run: yarn publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: npm publish with a JS registry token env, even if npm does not
      # consume this exact variable itself
      - name: vulnerable-token-auth-3a
        run: npm publish --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOT OK: inline NODE_AUTH_TOKEN assignment for npm publish
      - name: vulnerable-token-auth-3b
        run: NODE_AUTH_TOKEN=${{ secrets.NPM_TOKEN }} npm publish --provenance

      # NOT OK: yarn publish with a JS registry token env
      - name: vulnerable-token-auth-3c
        run: yarn publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # OK: unrelated inline assignment should not be treated as token auth
      - name: safe-inline-1
        run: FOO=bar npm publish --provenance

      # NOT OK: pnpm publish with NPM_TOKEN
      - name: vulnerable-token-auth-4
        run: pnpm publish --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # OK: private dependency token scoped only to install step
      - name: safe-private-deps-install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_READ_TOKEN }}
      - name: safe-private-deps-publish
        run: npm publish

  # Test case: token env var set at job level
  npm-job-level-token:
    name: npm-job-level-token
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      # NOT OK: npm publish with job-level NODE_AUTH_TOKEN
      - name: vulnerable-job-env-1
        run: npm publish --provenance
